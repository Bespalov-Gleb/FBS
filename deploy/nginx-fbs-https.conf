# Nginx для fbs-upakovka.ru с HTTPS (Let's Encrypt)
# Скопировать: sudo cp deploy/nginx-fbs-https.conf /etc/nginx/sites-available/fbs
# Включить: sudo ln -sf /etc/nginx/sites-available/fbs /etc/nginx/sites-enabled/
# Проверка: sudo nginx -t && sudo systemctl reload nginx
#
# Перед использованием: получить сертификат (см. DEPLOY.md)

# Редирект HTTP -> HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name fbs-upakovka.ru www.fbs-upakovka.ru _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fbs-upakovka.ru www.fbs-upakovka.ru;

    ssl_certificate /etc/letsencrypt/live/fbs-upakovka.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fbs-upakovka.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
